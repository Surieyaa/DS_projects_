{% extends "base.html" %}
{% block title %}Create account — PulseFit AI{% endblock %}
{% block content %}
<section class="auth-shell">
  <div class="auth-card glass">
    <span class="eyebrow">JOIN PULSEFIT</span>
    <h2>Create your account</h2>
    <form method="POST" class="form-stack">
      <label>Full name
        <input type="text" name="name" placeholder="Surieyaa S" required autofocus>
      </label>
      <label>Email
        <input type="email" name="email" placeholder="you@example.com" required>
      </label>
      <label>Password
        <input type="password" name="password" placeholder="Minimum 6 characters" minlength="6" required>
      </label>
      <button type="submit" class="btn btn-primary btn-block">Create account →</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </div>
</section>
{% endblock %}
