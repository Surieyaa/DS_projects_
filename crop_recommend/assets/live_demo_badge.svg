<svg width="260" height="64" viewBox="0 0 260 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="badgeBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3F7D53"/>
      <stop offset="100%" stop-color="#336847"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="260" height="64" rx="32" fill="url(#badgeBg)"/>

  <!-- sprouting plant, loops continuously -->
  <g transform="translate(32,32)">
    <ellipse cx="0" cy="20" rx="16" ry="4" fill="#2C4A24" opacity="0.35"/>
    <rect x="-3" y="20" width="6" height="0" rx="3" fill="#A8D5A2">
      <animate attributeName="height" values="0;22;22;0" keyTimes="0;0.35;0.85;1" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="20;-2;-2;20" keyTimes="0;0.35;0.85;1" dur="2.6s" repeatCount="indefinite"/>
    </rect>
    <path d="M0,3 C-9,-2 -13,-12 -10,-20 C1,-16 6,-6 0,3 Z" fill="#C9EAC3">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.35;0.5;0.85;1" dur="2.6s" repeatCount="indefinite"/>
    </path>
    <path d="M0,-3 C10,-8 14,-17 10,-24 C0,-20 -4,-11 0,-3 Z" fill="#E8F7E4">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.45;0.6;0.85;1" dur="2.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="62" y="38" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#FFFFFF">Try the Live Demo</text>
</svg>
